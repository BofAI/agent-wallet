[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bankofai-agent-wallet"
version = "2.3.0b6"
description = "Universal multi-chain secure signing SDK for AI agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "BankOfAI", email = "dev@bankofai.com"},
]
keywords = ["wallet", "signing", "blockchain", "evm", "tron", "agent", "mcp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0.0",
    "pycryptodome>=3.19.0",
    "eth-hash[pycryptodome]>=0.5.0",
    "eth-account>=0.8.0",
    "tronpy>=0.4.0",
    "typer>=0.9.0",
    "rich>=13.0.0",
    "questionary>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0", "pytest-asyncio>=0.21.0", "pytest-cov>=5.0.0"]

[project.urls]
Homepage = "https://github.com/BofAI/agent-wallet"
Documentation = "https://github.com/BofAI/agent-wallet#readme"
Repository = "https://github.com/BofAI/agent-wallet"
Issues = "https://github.com/BofAI/agent-wallet/issues"

[project.scripts]
agent-wallet = "agent_wallet.delivery.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_wallet"]

[tool.hatch.build.targets.sdist]
include = ["src/agent_wallet", "README.md", "LICENSE"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "--cov=agent_wallet",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-fail-under=80",
]

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "RUF",  # ruff-specific
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults (typer uses this)
    "B904",   # raise from in except — not needed for typer.Exit CLI patterns
    "E402",   # module level import not at top — needed for conditional imports
]

[tool.ruff.lint.isort]
known-first-party = ["agent_wallet"]

[tool.ruff.format]
quote-style = "double"
